name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run test suite with Postgres
        run: docker compose run --build --rm tests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        run: railway up --service dr-stone-api --project 7ebbad4b-dbc7-46b5-afd2-5850a0fe69d0 --environment production --ci -m "GitHub Actions deploy ${GITHUB_SHA}"

      - name: Deploy worker to Railway
        run: railway up --service dr-stone-worker --project 7ebbad4b-dbc7-46b5-afd2-5850a0fe69d0 --environment production --ci -m "GitHub Actions deploy ${GITHUB_SHA}"
