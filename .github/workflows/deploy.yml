name: Validate And Deploy

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref == 'refs/heads/master' && 'production-deploy' || format('validate-{0}', github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dr_stone_test
          POSTGRES_USER: dr_stone
          POSTGRES_PASSWORD: dr_stone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dr_stone -d dr_stone_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://dr_stone:dr_stone@127.0.0.1:5432/dr_stone_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run test suite
        run: pnpm test

  deploy-api:
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        run: railway up --service dr-stone-api --project 7ebbad4b-dbc7-46b5-afd2-5850a0fe69d0 --environment production --ci -m "GitHub Actions deploy ${GITHUB_SHA}"

  deploy-worker:
    needs: deploy-api
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker to Railway
        run: railway up --service dr-stone-worker --project 7ebbad4b-dbc7-46b5-afd2-5850a0fe69d0 --environment production --ci -m "GitHub Actions deploy ${GITHUB_SHA}"
