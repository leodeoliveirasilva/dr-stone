services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dr_stone_test
      POSTGRES_USER: dr_stone
      POSTGRES_PASSWORD: dr_stone
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dr_stone -d dr_stone_test"]
      interval: 5s
      timeout: 5s
      retries: 12

  tests:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql://dr_stone:dr_stone@postgres:5432/dr_stone_test}
    command: ["pnpm", "test"]

  worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dr_stone:dr_stone@postgres:5432/dr_stone_test}
      DR_STONE_ENABLED_SOURCES: ${DR_STONE_ENABLED_SOURCES:-kabum,amazon,pichau}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-43200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: ["node", "dr-stone-scrapper/dist/worker.js", "--run-once"]
