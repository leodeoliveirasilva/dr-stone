services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dr_stone_test
      POSTGRES_USER: dr_stone
      POSTGRES_PASSWORD: dr_stone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dr_stone -d dr_stone_test"]
      interval: 5s
      timeout: 5s
      retries: 12

  tests:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
    entrypoint: []
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql://dr_stone:dr_stone@postgres:5432/dr_stone_test}
    volumes:
      - .:/app
    command: /opt/dr-stone-venv/bin/python -m pytest
